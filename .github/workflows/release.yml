name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      deploy_pages:
        description: 'Deploy Web to GitHub Pages'
        required: false
        type: boolean
        default: true
      notes:
        description: 'Release notes (markdown, optional)'
        required: false
        type: string
        default: ''

env:
  FLUTTER_VERSION: 3.41.6
  APP_REPO_OWNER: AvianJay
  APP_REPO_NAME: yetanotherbusapp
  APP_WORKFLOW_API_ID: build.yml
  APP_WORKFLOW_NIGHTLY_ID: build
  APP_UPDATE_CHANNEL: release
  IOS_FLAVOR: YABus

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Verify & build ──────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Prepare Android signing files
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$KEYSTORE_ALIAS" && -n "$KEYSTORE_PASSWORD" ]]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            printf '%s\n' \
              "storePassword=$KEYSTORE_PASSWORD" \
              "keyPassword=$KEYSTORE_PASSWORD" \
              "keyAlias=$KEYSTORE_ALIAS" \
              "storeFile=upload-keystore.jks" \
              > android/key.properties
          else
            echo "Signing secrets are missing; skip generating release keystore files."
          fi
      - name: Bump version
        shell: bash
        run: |
          sed -i "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Build APK
        run: >
          flutter build apk --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=android-apk-release
      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/YABus-${{ inputs.version }}.apk
      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/YABus-${{ inputs.version }}.apk

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Bump version
        shell: bash
        run: |
          sed -i "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Build Web
        run: >
          flutter build web --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=web-release
      - name: Upload Web artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-release
          path: build/web

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Install dependencies
        run: flutter pub get
      - name: Bump version
        shell: pwsh
        run: |
          $updated = (Get-Content pubspec.yaml) -replace '^version:.*$', 'version: ${{ inputs.version }}+${{ github.run_number }}'
          $updated | Set-Content pubspec.yaml -Encoding utf8NoBOM
          Select-String '^version:' pubspec.yaml
      - name: Build Windows
        run: >
          flutter build windows --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=windows-release
      - name: Package Windows artifact
        shell: pwsh
        run: |
          $stageRoot = 'build/windows/package'
          $stageDir = Join-Path $stageRoot 'YABus-${{ inputs.version }}-windows-x64'
          Remove-Item $stageRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
          Copy-Item -Recurse -Force 'build/windows/x64/runner/Release/*' $stageDir
          Compress-Archive -Path $stageDir -DestinationPath 'build/windows/YABus-${{ inputs.version }}-windows-x64.zip' -Force
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: build/windows/YABus-${{ inputs.version }}-windows-x64.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      - name: Install dependencies
        run: flutter pub get
      - name: Bump version
        shell: bash
        run: |
          sed -i "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Build Linux
        run: >
          flutter build linux --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=linux-release
      - name: Package Linux artifact
        shell: bash
        run: |
          PACKAGE_ROOT="build/linux/package"
          PACKAGE_DIR="$PACKAGE_ROOT/YABus-${{ inputs.version }}-linux-x64"
          rm -rf "$PACKAGE_ROOT"
          mkdir -p "$PACKAGE_DIR"
          cp -R build/linux/x64/release/bundle/. "$PACKAGE_DIR/"
          tar -C "$PACKAGE_ROOT" -czf build/linux/YABus-${{ inputs.version }}-linux-x64.tar.gz "YABus-${{ inputs.version }}-linux-x64"
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: build/linux/YABus-${{ inputs.version }}-linux-x64.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
      - name: Install dependencies
        run: flutter pub get
      - name: Bump version
        shell: bash
        run: |
          sed -i '' "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Build macOS
        run: >
          flutter build macos --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=macos-release
      - name: Package macOS app bundle
        shell: bash
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found."
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "build/macos/YABus-${{ inputs.version }}-macos.zip"
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: build/macos/YABus-${{ inputs.version }}-macos.zip

  build-ios-ipa:
    name: Build iOS unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Bump version
        shell: bash
        run: |
          sed -i '' "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Prepare iOS build
        run: flutter precache --ios
      - name: Generate iOS archive without codesign
        run: >
          flutter build ios --release --no-codesign
          --flavor=${{ env.IOS_FLAVOR }}
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=ios-unsigned-ipa
      - name: Package unsigned IPA
        shell: bash
        run: |
          mkdir -p build/ipa/temp/Payload
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/ios/archive -path "*.xcarchive/Products/Applications/*.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "No built iOS .app bundle found for IPA packaging."
            exit 1
          fi
          cp -R "$APP_PATH" build/ipa/temp/Payload/
          cd build/ipa/temp
          zip -r Generated_IPA.zip Payload
          mv Generated_IPA.zip ../YABus-${{ inputs.version }}.ipa
          cd ../../..
          rm -rf build/ipa/temp
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-unsigned-ipa
          path: build/ipa/YABus-${{ inputs.version }}.ipa

  # ── GitHub Pages ────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    if: inputs.deploy_pages == true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v5
        with:
          name: web-release
          path: web-dist
      - name: Add .nojekyll
        run: touch web-dist/.nojekyll
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web-dist
      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs:
      - build-android
      - build-web
      - build-windows
      - build-linux
      - build-macos
      - build-ios-ipa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download Android APK
        uses: actions/download-artifact@v5
        with:
          name: android-apk-release
          path: release-assets
      - name: Download iOS IPA
        uses: actions/download-artifact@v5
        with:
          name: ios-unsigned-ipa
          path: release-assets
      - name: Download Windows package
        uses: actions/download-artifact@v5
        with:
          name: windows-release
          path: release-assets
      - name: Download Linux package
        uses: actions/download-artifact@v5
        with:
          name: linux-release
          path: release-assets
      - name: Download macOS package
        uses: actions/download-artifact@v5
        with:
          name: macos-release
          path: release-assets
      - name: Download Web bundle
        uses: actions/download-artifact@v5
        with:
          name: web-release
          path: release-assets/web
      - name: Package Web artifact
        shell: bash
        run: |
          cd release-assets/web
          zip -r ../YABus-${{ inputs.version }}-web.zip .
      - name: List release assets
        run: find release-assets -maxdepth 2 -type f -exec ls -lh {} \;
      - name: Build release notes
        id: notes
        shell: bash
        run: |
          if [[ -n "${{ inputs.notes }}" ]]; then
            NOTES="${{ inputs.notes }}"
          else
            NOTES="## YABus ${{ inputs.version }}"
            NOTES+=$'\n'"Release build from commit \`${{ github.sha }}\`."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: YABus ${{ inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-assets/YABus-${{ inputs.version }}.apk
            release-assets/YABus-${{ inputs.version }}.ipa
            release-assets/YABus-${{ inputs.version }}-windows-x64.zip
            release-assets/YABus-${{ inputs.version }}-linux-x64.tar.gz
            release-assets/YABus-${{ inputs.version }}-macos.zip
            release-assets/YABus-${{ inputs.version }}-web.zip
