name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      deploy_pages:
        description: 'Deploy Web to GitHub Pages'
        required: false
        type: boolean
        default: true
      notes:
        description: 'Release notes (markdown, optional)'
        required: false
        type: string
        default: ''

env:
  FLUTTER_VERSION: 3.41.6
  APP_REPO_OWNER: AvianJay
  APP_REPO_NAME: yetanotherbusapp
  APP_WORKFLOW_API_ID: build.yml
  APP_WORKFLOW_NIGHTLY_ID: build
  APP_UPDATE_CHANNEL: release
  IOS_FLAVOR: YABus

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Verify & build ──────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Prepare Android signing files
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [[ -n "$KEYSTORE_BASE64" && -n "$KEYSTORE_ALIAS" && -n "$KEYSTORE_PASSWORD" ]]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
            printf '%s\n' \
              "storePassword=$KEYSTORE_PASSWORD" \
              "keyPassword=$KEYSTORE_PASSWORD" \
              "keyAlias=$KEYSTORE_ALIAS" \
              "storeFile=upload-keystore.jks" \
              > android/key.properties
          else
            echo "Signing secrets are missing; skip generating release keystore files."
          fi
      - name: Bump version
        shell: bash
        run: |
          sed -i "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Build APK
        run: >
          flutter build apk --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=android-apk-release
      - name: Rename APK
        shell: bash
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/YABus-${{ inputs.version }}.apk
      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/YABus-${{ inputs.version }}.apk

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Bump version
        shell: bash
        run: |
          sed -i "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Build Web
        run: >
          flutter build web --release
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=web-release
      - name: Upload Web artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-release
          path: build/web

  build-ios-ipa:
    name: Build iOS unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Bump version
        shell: bash
        run: |
          sed -i '' "s/^version:.*/version: ${{ inputs.version }}+${{ github.run_number }}/" pubspec.yaml
          grep '^version:' pubspec.yaml
      - name: Prepare iOS build
        run: flutter precache --ios
      - name: Generate iOS archive without codesign
        run: >
          flutter build ios --release --no-codesign
          --flavor=${{ env.IOS_FLAVOR }}
          --dart-define=APP_GIT_SHA=${{ github.sha }}
          --dart-define=APP_UPDATE_CHANNEL=${{ env.APP_UPDATE_CHANNEL }}
          --dart-define=APP_REPO_OWNER=${{ env.APP_REPO_OWNER }}
          --dart-define=APP_REPO_NAME=${{ env.APP_REPO_NAME }}
          --dart-define=APP_WORKFLOW_API_ID=${{ env.APP_WORKFLOW_API_ID }}
          --dart-define=APP_WORKFLOW_NIGHTLY_ID=${{ env.APP_WORKFLOW_NIGHTLY_ID }}
          --dart-define=APP_NIGHTLY_ARTIFACT=ios-unsigned-ipa
      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/temp/Payload
          mv build/ios/archive/*.xcarchive/Products/Applications/*.app build/ipa/temp/Payload/ 2>/dev/null || true
          if [ ! -d "build/ipa/temp/Payload/"*.app ]; then
            # Try alternative path from flutter build output
            APP_PATH=$(find build -name "Runner.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              cp -r "$APP_PATH" build/ipa/temp/Payload/
            fi
          fi
          cd build/ipa/temp
          zip -r Generated_IPA.zip Payload
          mv Generated_IPA.zip ../YABus-${{ inputs.version }}.ipa
          cd ../../..
          rm -rf build/ipa/temp
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-unsigned-ipa
          path: build/ipa/YABus-${{ inputs.version }}.ipa

  # ── GitHub Pages ────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-web
    if: inputs.deploy_pages == true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v5
        with:
          name: web-release
          path: web-dist
      - name: Add .nojekyll
        run: touch web-dist/.nojekyll
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web-dist
      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios-ipa]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Download Android APK
        uses: actions/download-artifact@v5
        with:
          name: android-apk-release
          path: release-assets
      - name: Download iOS IPA
        uses: actions/download-artifact@v5
        with:
          name: ios-unsigned-ipa
          path: release-assets
      - name: List release assets
        run: ls -lh release-assets/
      - name: Build release notes
        id: notes
        shell: bash
        run: |
          if [[ -n "${{ inputs.notes }}" ]]; then
            NOTES="${{ inputs.notes }}"
          else
            NOTES="## YABus ${{ inputs.version }}"
            NOTES+=$'\n'"Release build from commit \`${{ github.sha }}\`."
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: YABus ${{ inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-assets/YABus-${{ inputs.version }}.apk
            release-assets/YABus-${{ inputs.version }}.ipa
